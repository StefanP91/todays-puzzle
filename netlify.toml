[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[functions]
  included_files = ["netlify/functions/lib/fonts/**"]

[[redirects]]
  from = "/api/geo"
  to = "/.netlify/functions/geo"
  status = 200
  force = true

[[redirects]]
  from = "/api/share"
  to = "/.netlify/functions/share"
  status = 200
  force = true

[[redirects]]
  from = "/api/share.png"
  to = "/.netlify/functions/share-og"
  status = 200
  force = true

[[redirects]]
  from = "/api/og.png"
  to = "/.netlify/functions/home-og-image"
  status = 200
  force = true

[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track-visit"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/session"
  to = "/.netlify/functions/admin-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/stats"
  to = "/.netlify/functions/admin-stats"
  status = 200
  force = true

[[edge_functions]]
  path = "/*"
  function = "og-meta"
  excludedPath = ["/admin", "/api/*"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
