[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[functions]
  included_files = ["netlify/functions/lib/fonts/**"]

[[redirects]]
  from = "/share"
  to = "/.netlify/functions/share"
  status = 200
  force = true

[[redirects]]
  from = "/share.png"
  to = "/.netlify/functions/share-og"
  status = 200
  force = true

[[redirects]]
  from = "/api/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/api/sitemap.xml"
  status = 301
  force = true

[[redirects]]
  from = "/api/geo"
  to = "/.netlify/functions/geo"
  status = 200
  force = true

[[redirects]]
  from = "/api/share"
  to = "/.netlify/functions/share"
  status = 200
  force = true

[[redirects]]
  from = "/api/share.png"
  to = "/.netlify/functions/share-og"
  status = 200
  force = true

[[redirects]]
  from = "/api/og.png"
  to = "/.netlify/functions/home-og-image"
  status = 200
  force = true

[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track-visit"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/session"
  to = "/.netlify/functions/admin-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/stats"
  to = "/.netlify/functions/admin-stats"
  status = 200
  force = true

[[edge_functions]]
  path = "/*"
  function = "og-meta"
  excludedPath = ["/admin", "/api/*", "/sitemap.xml", "/robots.txt"]

[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/api/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
